# Phase 4c — SD 1.5 LoRA on stable-diffusion-x4-upscaler.
#
# v3 conservative recipe (post v1+v2 failure to clear the SDXL gate):
#   - alpha < rank: scale = 4/16 = 0.25 (down from 1.0). At scale 1.0 the
#     LoRA delta destabilised the multi-step denoising trajectory even when
#     per-step noise-prediction loss looked clean.
#   - lr 5e-5 (down from 1e-4) so LoRA weights grow more slowly. The v2
#     safetensors had abs.mean ~0.018, near the upper end for a healthy
#     adapter; this should land around half that.
#   - bicubic_lr_from_hr: skip the synthetic real-ESRGAN-style LR and use
#     plain 4x bicubic downsamples of HR on the fly. Matches the base
#     model's original training-time LR distribution; the LoRA only has
#     to learn the captioned-photo refinement, not a full degradation
#     model.
#
# Cost target: <$10 at $0.69/hr. Time target: <6 hrs.

base_model: stabilityai/stable-diffusion-x4-upscaler

lora_rank: 16
lora_alpha: 4
lora_target_modules:
  - to_q
  - to_k
  - to_v
  - to_out.0

learning_rate: 5.0e-5
weight_decay: 0.0
batch_size: 4
max_steps: 8000
max_noise_level: 200

bicubic_lr_from_hr: true

sample_every: 500
sample_inference_steps: 25
checkpoint_every: 1000

pairs_dir: data/pairs
captions_path: data/captions.jsonl
output_dir: outputs/runs/sd15_main
num_workers: 4
