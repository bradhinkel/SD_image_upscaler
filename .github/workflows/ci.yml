name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.7"

      - name: Set up Python
        run: uv python install 3.12

      # CI runs on CPU — install CPU-only torch to avoid pulling ~2.5 GB of CUDA wheels.
      # Overrides the cu128 index pin from pyproject.toml for this job only.
      - name: Install deps (CPU torch)
        run: |
          uv venv
          uv pip install torch --index-url https://download.pytorch.org/whl/cpu
          uv pip install -e ".[dev]"

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Ruff lint
        run: uv run ruff check .

      - name: Pytest
        run: uv run pytest
